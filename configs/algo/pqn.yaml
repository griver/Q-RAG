# Model Configuration
model:
  bert_name: "facebook/contriever"
  revision: "main"
  use_fast_tokenizer: true
  predictor:
    num_layers: 12
    input_dim: 768
    hidden_dim: 256
    output_dim: 1

# PQN Configuration
pqn:
  _target_: your_module.PQN
  
  state_embed: &bert_predictor
    _target_: rl.bert_predictor.BertPredictor
    bert:
      _target_: transformers.AutoModel.from_pretrained
      pretrained_model_name_or_path: ${algo.model.bert_name}
      revision: ${algo.model.revision}
    num_hidden_layers: ${algo.model.predictor.num_layers}
    tokenizer:
      _target_: transformers.AutoTokenizer.from_pretrained
      pretrained_model_name_or_path: ${algo.model.bert_name}
      revision: ${algo.model.revision}
      use_fast: ${algo.model.use_fast_tokenizer}
    model_dim: ${algo.model.predictor.input_dim}
    output_size: ${algo.model.predictor.hidden_dim}
    n_output: ${algo.model.predictor.output_dim}
  
  action_embed: *bert_predictor
  state_embed_target: *bert_predictor
  action_embed_target: *bert_predictor

  hyperparams:
    gamma: 0.99
    alpha: 0.005
    Lambda: 0.6
    tau: 0.01

  optimizer:
    _target_: torch.optim.AdamW
    lr: 5e-5            
    betas: [0.9, 0.98]  
    eps: 1e-06          
    weight_decay: 0.01  
    
  scheduler:
    _target_: rl.sarsa.WarmupLinearScheduler
    total: 40000
    ratio: 0.0
    warmup: 1000



