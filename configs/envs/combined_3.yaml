task: "combined"
dataset1_path: "/mnt/Datasets/Hotpotqa"
dataset2_path: "/mnt/Datasets/Musique"
dataset3_path: "/mnt/Datasets/Babilong"
max_steps: 6
sort_by_index: False

positions_processor: none

positions_processor_dict:
  none:
    _target_: envs.text_env.AbsolutePositionProcessor
  absolute:
    _target_: envs.text_env.AbsolutePositionProcessor
  random:
    _target_: envs.text_env.RandomPositionProcessor
    max_chunks_count: 2000
  relative:
    _target_: envs.text_env.RelativePositionProcessor
    step_size: 20

train_dataset: &train_dataset
  _target_: envs.RetrievalCombinedThree
  shuffle: True  # Initial shuffle for training
  dataset1:
    _target_: envs.RetrievalHotPotQA
    path: ${envs.dataset1_path}
    split: 'train'
    seed: ${seed}
  dataset2:
    _target_: envs.RetrievalMusique
    path: ${envs.dataset2_path}
    split: 'train'
    seed: ${seed}
  dataset3:
    _target_: envs.RetrievalBabiLong
    num_sentences: 100
    task_dataset:
      _target_: envs.dataloaders.babilong.TaskDataset
      dataset_path: "${envs.dataset3_path}/babi/en-10k/qa2_two-supporting-facts_train.txt"
    noise_sentence_sampler:
      _target_: envs.dataloaders.babilong.RetrSentenceSampler
      dataset:
        _target_: datasets.load_from_disk
        dataset_path: "${envs.dataset3_path}/pg19-with-sentences/train"

test_dataset: &test_dataset
  _target_: envs.RetrievalCombinedThree
  shuffle: False  # No shuffle for testing
  dataset1:
    _target_: envs.RetrievalHotPotQA
    path: ${envs.dataset1_path}
    split: 'eval'
    seed: ${seed}
  dataset2:
    _target_: envs.RetrievalMusique
    path: ${envs.dataset2_path}
    split: 'eval'
    seed: ${seed}
  dataset3:
    _target_: envs.RetrievalBabiLong
    num_sentences: 100
    task_dataset:
      _target_: envs.dataloaders.babilong.TaskDataset
      dataset_path: "${envs.dataset3_path}/babi/en-10k/qa2_two-supporting-facts_test.txt"
    noise_sentence_sampler:
      _target_: envs.dataloaders.babilong.RetrSentenceSampler
      dataset:
        _target_: datasets.load_from_disk
        dataset_path: "${envs.dataset3_path}/pg19-with-sentences/test"

# Core environment configuration for training
env:
  _target_: envs.qa_env.QAEnv
  max_steps: ${envs.max_steps}
  action_embed_length: ${max_action_length}
  max_action_length_in_memory: ${max_action_length_in_memory}
  separator: " [SEP] "
  sort_by_index: ${envs.sort_by_index}
  positions_processor:
    _target_: envs.text_env.AbsolutePositionProcessor
  feedback_model:
    _target_: rl.feedback.GroundTruthFeedback
    penalize_extra_steps: True
  dataset:
    _target_: envs.QADatasetAdapter
    dataset: *train_dataset

test_env:
  _target_: envs.qa_env.QAEnv
  max_steps: ${envs.env.max_steps}
  action_embed_length: ${max_action_length}
  max_action_length_in_memory: ${max_action_length_in_memory}
  separator: ${envs.env.separator}
  sort_by_index: ${envs.sort_by_index}
  positions_processor: ${envs.env.positions_processor}
  feedback_model:
    _target_: rl.feedback.GroundTruthFeedback
    penalize_extra_steps: False
#  reward_model:
#    _target_: envs.qa_env.PositionalGTReward
  dataset:
    _target_: envs.QADatasetAdapter
    dataset: *test_dataset
